apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: microservices
data:
  application.yml: |
    spring:
      application:
        name: product-service
      datasource:
        url: jdbc:postgresql://postgres-service:5432/productdb
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          idle-timeout: 300000
          max-lifetime: 1200000
          connection-timeout: 20000
          leak-detection-threshold: 60000
      jpa:
        hibernate:
          ddl-auto: update
        properties:
          hibernate:
            format_sql: true
            jdbc:
              batch_size: 20
            order_inserts: true
            order_updates: true
        show-sql: false
      redis:
        host: redis-service
        port: 6379
        timeout: 2000ms
        lettuce:
          pool:
            max-active: 20
            max-idle: 10
            min-idle: 5
            max-wait: 2000ms
      cache:
        type: redis
        redis:
          time-to-live: 600000
          cache-null-values: false
    
    server:
      port: 8082
      compression:
        enabled: true
        mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
        min-response-size: 1024
      tomcat:
        max-threads: 200
        min-spare-threads: 10
        max-connections: 8192
        accept-count: 100
        connection-timeout: 20000
    
    logging:
      level:
        com.example.productservice: INFO
        org.springframework.web: INFO
        org.springframework.boot: INFO
    
    management:
      endpoints:
        web:
          exposure:
            include: "health,info,metrics,prometheus"
      endpoint:
        health:
          show-details: always
        metrics:
          enabled: true
        prometheus:
          enabled: true
      metrics:
        export:
          prometheus:
            enabled: true
        distribution:
          percentiles-histogram:
            http.server.requests: true
          percentiles:
            http.server.requests: 0.5, 0.95, 0.99
          sla:
            http.server.requests: 10ms, 50ms, 100ms, 200ms, 500ms
