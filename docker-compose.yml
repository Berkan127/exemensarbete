services:
  users-db:
    image: postgres:16
    container_name: users-db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: users
      POSTGRES_PASSWORD: users
    ports:
      - "5433:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  products-db:
    image: postgres:16
    container_name: products-db
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: products
      POSTGRES_PASSWORD: products
    ports:
      - "5434:5432"
    volumes:
      - products_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U products -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  orders-db:
    image: postgres:16
    container_name: orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    ports:
      - "5435:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/users_db
      SPRING_DATASOURCE_USERNAME: users
      SPRING_DATASOURCE_PASSWORD: users
    ports:
      - "8081:8081"
    depends_on:
      users-db:
        condition: service_healthy

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://products-db:5432/products_db
      SPRING_DATASOURCE_USERNAME: products
      SPRING_DATASOURCE_PASSWORD: products
    ports:
      - "8082:8082"
    depends_on:
      products-db:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://orders-db:5432/orders_db
      SPRING_DATASOURCE_USERNAME: orders
      SPRING_DATASOURCE_PASSWORD: orders
    ports:
      - "8083:8083"
    depends_on:
      orders-db:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service

volumes:
  users_db_data:
  products_db_data:
  orders_db_data:

