services:
  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    volumes:
      - user_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: product
      POSTGRES_PASSWORD: product
    volumes:
      - product_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
    volumes:
      - order_db_data:/var/lib/postgresql/data
    ports:
      - "55435:5432"

  user-service:
    build:
      context: ./user-service
    depends_on:
      - user-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/userdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: user
    ports:
      - "8081:8081"

  product-service:
    build:
      context: ./product-service
    depends_on:
      - product-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/productdb
      SPRING_DATASOURCE_USERNAME: product
      SPRING_DATASOURCE_PASSWORD: product
    ports:
      - "8082:8082"

  order-service:
    build:
      context: ./order-service
    depends_on:
      - order-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orderdb
      SPRING_DATASOURCE_USERNAME: order
      SPRING_DATASOURCE_PASSWORD: order
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: ./api-gateway
    depends_on:
      - user-service
      - product-service
      - order-service
    ports:
      - "8080:8080"

volumes:
  user_db_data:
  product_db_data:
  order_db_data:
