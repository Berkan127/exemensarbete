input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][service_name] {
    mutate {
      add_field => { "service" => "%{[fields][service_name]}" }
    }
  }
  
  date {
    match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
  
  stdout {
    codec => rubydebug
  }
}
